name: SoloArise
version: 1.0.0
main: com.soloarise.plugin.SoloArisePlugin
api-version: 1.21
author: YourName
description: Solo Leveling Arise Power System - Capture and summon souls!

commands:
  arise:
    description: Attempt to capture the last mob you killed's soul
    usage: /arise
    permission: soloarise.use
    
  soulcome:
    description: Recall all summoned souls
    usage: /soulcome
    permission: soloarise.use
    
  soulrelease:
    description: Release a captured soul
    usage: /soulrelease <soulname>
    permission: soloarise.use
    
  soulability:
    description: View soul abilities
    usage: /soulability <soulname>
    permission: soloarise.use
    
  soulheal:
    description: Heal a dead soul with diamonds
    usage: /soulheal <soulname>
    permission: soloarise.use
    
  souls:
    description: List all your souls
    usage: /souls
    permission: soloarise.use
    
  soloarise:
    description: Admin command for SoloArise
    usage: /soloarise <reload/give/remove/list>
    permission: soloarise.admin

permissions:
  soloarise.use:
    description: Use basic soul commands
    default: true
    
  soloarise.admin:
    description: Use admin commands
    default: op
